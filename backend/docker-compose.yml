services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      # Override DATABASE_URL so the container connects to the db service,
      # not localhost (which would be the container itself).
      DATABASE_URL: "postgresql+psycopg2://adthub_admin:localpassword@db:5432/adthub_local"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: adthub_local
      POSTGRES_USER: adthub_admin
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5434:5432"
    volumes:
      - adthub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adthub_admin -d adthub_local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  adthub_postgres_data:
