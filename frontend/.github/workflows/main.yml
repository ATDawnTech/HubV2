name: Deploy React App

on:
  push:
    branches:
      - develop
      - staging
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

        # Select build command + bucket
      - name: Set environment config
        run: |
          if [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "BUILD_CMD=build:dev" >> $GITHUB_ENV
            echo "S3_BUCKET=atdawn-application" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF_NAME}" == "staging" ]]; then
            echo "BUILD_CMD=build:stg" >> $GITHUB_ENV
            echo "S3_BUCKET=at-dawn-application-staging" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF_NAME}" == "production" ]]; then
            echo "BUILD_CMD=build:prod" >> $GITHUB_ENV
            echo "S3_BUCKET=at-dawn-application-production" >> $GITHUB_ENV
          fi
          echo "Deploying to $S3_BUCKET"
          echo "Build command: $BUILD_CMD"
          echo "AWS credentials: ${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "AWS secret access key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Build app
        run: npm run $BUILD_CMD

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync dist s3://$S3_BUCKET --delete
