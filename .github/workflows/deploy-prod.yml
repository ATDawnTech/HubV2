name: Deploy to Prod

# Manual trigger only — requires Michael's approval via the "prod" GitHub Environment.
# Configure the "prod" GitHub Environment with Michael as a required reviewer.
#
# MIGRATION NOTE: Before running this workflow for the first time, confirm that:
# 1. The Alembic migration from Supabase schema to HubV2 schema has been validated in test
# 2. Data migration from Supabase has been completed or is not required
# 3. The DNS cutover plan has been reviewed — adthub.atdawntech.com currently serves
#    the legacy ADTHUB app. DNS cutover is a separate manual step after this deployment.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (git SHA). Defaults to latest commit on main."
        required: false
        default: ""
      deploy_frontend:
        description: "Deploy Frontend to S3 + CloudFront"
        required: true
        type: boolean
        default: true
      deploy_backend:
        description: "Deploy Backend to ECR + ECS"
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: adthub-prod-s3-frontend
  SERVICE_NAME: adthub-prod-api
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY_URL }}

jobs:
  deploy-frontend-prod:
    name: Frontend → S3 + CloudFront (Prod)
    if: inputs.deploy_frontend == true
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend (Prod)
        run: cd frontend && npm run build -- --mode production
        env:
          VITE_API_BASE_URL: https://api.adthub.atdawntech.com
          VITE_ENVIRONMENT: production

      - name: Configure AWS credentials (Prod OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload dist/ to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID_PROD }} \
            --paths "/*"

  deploy-backend-prod:
    name: Backend → ECR + ECS (Prod)
    if: inputs.deploy_backend == true
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (Prod OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: tag
        run: echo "value=${{ inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.ECR_REGISTRY }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to ECS Prod
        run: |
          aws ecs update-service \
            --cluster adthub-prod-ecs-cluster \
            --service adthub-prod-ecs-api \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster adthub-prod-ecs-cluster \
            --services adthub-prod-ecs-api

  smoke-test-prod:
    name: Smoke Test (Prod)
    if: inputs.deploy_backend == true
    runs-on: ubuntu-latest
    needs: deploy-backend-prod
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install requests pytest
      - name: Run smoke tests
        run: pytest backend/tests/smoke/test_env.py -v --noconftest
        env:
          SMOKE_TEST_BASE_URL: https://api.adthub.atdawntech.com
