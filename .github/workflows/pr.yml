name: PR Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install poetry && cd backend && poetry install --no-root
      - name: Ruff lint
        run: cd backend && poetry run ruff check .
      - name: Ruff format check
        run: cd backend && poetry run ruff format --check .
      - name: Type check
        run: cd backend && poetry run mypy src/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install poetry && cd backend && poetry install --no-root
      - name: Run unit tests
        run: cd backend && poetry run pytest tests/unit tests/schema -v --cov --cov-fail-under=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"
      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: infrastructure/
      - name: Terraform validate (dev)
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: infrastructure/environments/dev/
      - name: Terraform validate (test)
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: infrastructure/environments/test/
      - name: Terraform validate (prod)
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: infrastructure/environments/prod/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build
