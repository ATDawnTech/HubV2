name: PR Pipeline

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install poetry && cd backend && poetry install --no-root
      - name: Ruff lint
        run: cd backend && poetry run ruff check .
      - name: Ruff format check
        run: cd backend && poetry run ruff format --check .
      - name: Type check
        run: cd backend && poetry run mypy src/
      - name: Security scan (Bandit)
        run: cd backend && poetry run bandit -r src/ -c pyproject.toml

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: adthub_test
          POSTGRES_USER: adthub_admin
          POSTGRES_PASSWORD: ci-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install poetry && cd backend && poetry install --no-root
      - name: Run unit tests
        run: cd backend && poetry run pytest tests/unit tests/schema -v --cov --cov-fail-under=80
        env:
          JWT_SECRET: ci-unit-test-placeholder
          DATABASE_URL: postgresql+psycopg2://adthub_admin:ci-test-password@localhost:5432/adthub_test
          TEST_DATABASE_URL: postgresql+psycopg2://adthub_admin:ci-test-password@localhost:5432/adthub_test
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"
      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: infrastructure/
      - name: Terraform validate (dev)
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: infrastructure/environments/dev/
      - name: Terraform validate (test)
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: infrastructure/environments/test/
      - name: Terraform validate (prod)
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: infrastructure/environments/prod/

  terraform-plan:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    needs: terraform-validate
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEV_DEPLOY_ROLE }}
          aws-region: us-east-1
      - name: Terraform init
        run: terraform init
        working-directory: infrastructure/environments/dev/
      - name: Terraform plan
        run: terraform plan -no-color -detailed-exitcode
        working-directory: infrastructure/environments/dev/
